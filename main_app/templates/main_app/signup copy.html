{% load static %}
<link rel="stylesheet" href="{% static 'wellness/css/style.css' %}" />
<div class="signup-container">
    <h2>Join the Wellness Initiative</h2>
    <p>Create your account to start your daily journey.</p>

    <form method="post" action="{% url 'signup' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>Full Name</label>
            <input
                type="text"
                name="name"
                required
                placeholder="Enter your name"
            />
        </div>
        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required />
        </div>
        <div class="form-group">
            <label for="id_country">Country</label>
            <select name="country" id="id_country" required>
                <option value="" disabled selected>Select your country</option>
                {% for code, name in countries %}
                <option value="{{ code }}">{{ name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="notification-opt-in">
            <input type="checkbox" name="notifications" id="notif" />
            <label for="notif"
                >Activate daily reminders (Email notifications)</label
            >
        </div>

        <button type="submit">Sign Up</button>
    </form>
</div>
